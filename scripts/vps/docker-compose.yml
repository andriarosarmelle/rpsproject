services:
  backend:
    build:
      context: ../../rps-backend
      dockerfile: Dockerfile
    restart: unless-stopped
    environment:
      NODE_ENV: production
      PORT: 3000
      JWT_SECRET: ${JWT_SECRET}
      DB_HOST: ${DB_HOST:-localhost}
      DB_PORT: ${DB_PORT:-5432}
      DB_USER: ${DB_USER:-rps_user}
      DB_PASSWORD: ${DB_PASSWORD:-rps_pass}
      DB_NAME: ${DB_NAME:-rps_db}
      DB_SYNCHRONIZE: ${DB_SYNCHRONIZE:-false}
      DB_LOGGING: ${DB_LOGGING:-false}
      AUTH_DISABLED: ${AUTH_DISABLED:-false}
      ADMIN_ALLOWED_EMAILS: ${ADMIN_ALLOWED_EMAILS:-}
      ADMIN_BOOTSTRAP_EMAILS: ${ADMIN_BOOTSTRAP_EMAILS:-}
      ADMIN_BOOTSTRAP_PASSWORD: ${ADMIN_BOOTSTRAP_PASSWORD:-}
      ALLOWED_REGISTRATION_DOMAINS: ${ALLOWED_REGISTRATION_DOMAINS:-localhost.local}
      SWAGGER_ENABLED: ${SWAGGER_ENABLED:-true}
      SWAGGER_PATH: ${SWAGGER_PATH:-api-docs}
      LOG_LEVEL: ${LOG_LEVEL:-info}

      # n8n internal access
      N8N_BASE_URL: ${N8N_BASE_URL:-http://n8n:5678/n8n}
      N8N_WEBHOOK_URL: ${N8N_WEBHOOK_URL:-http://n8n:5678/n8n}
      N8N_WEBHOOK_PATH: ${N8N_WEBHOOK_PATH:-/webhook/sondage-rps-solutions-tech}
      N8N_HEALTH_REQUIRED: ${N8N_HEALTH_REQUIRED:-false}
    depends_on:
      n8n:
        condition: service_started
    extra_hosts:
      - "host.docker.internal:host-gateway"
    networks:
      - rps_network

  frontend:
    build:
      context: ../../rps-frontend/nextjs-app
      dockerfile: Dockerfile
      args:
        NEXT_PUBLIC_API_URL: ${NEXT_PUBLIC_API_URL:-http://localhost/api}
        NEXT_PUBLIC_APP_URL: ${NEXT_PUBLIC_APP_URL:-http://localhost}
        NEXT_PUBLIC_STRAPI_URL: ${NEXT_PUBLIC_STRAPI_URL:-}
        NEXT_PUBLIC_BACKEND_MODE: ${NEXT_PUBLIC_BACKEND_MODE:-real}
    restart: unless-stopped
    environment:
      NODE_ENV: production
      PORT: 3001
      NEXT_PUBLIC_API_URL: ${NEXT_PUBLIC_API_URL:-http://localhost/api}
      NEXT_PUBLIC_APP_URL: ${NEXT_PUBLIC_APP_URL:-http://localhost}
      NEXT_PUBLIC_STRAPI_URL: ${NEXT_PUBLIC_STRAPI_URL:-}
      NEXT_PUBLIC_BACKEND_MODE: ${NEXT_PUBLIC_BACKEND_MODE:-real}
      API_URL: http://backend:3000/api
      APP_URL: ${APP_URL:-http://localhost}
      STRAPI_API_TOKEN: ${STRAPI_API_TOKEN:-}
      ADMIN_ALLOWED_EMAILS: ${ADMIN_ALLOWED_EMAILS:-}
      N8N_BASE_URL: ${N8N_BASE_URL:-http://n8n:5678/n8n}
      N8N_WEBHOOK_URL: ${N8N_WEBHOOK_URL:-http://n8n:5678/n8n}
      N8N_WEBHOOK_PATH: ${N8N_WEBHOOK_PATH:-/webhook/sondage-rps-solutions-tech}
    depends_on:
      - backend
    volumes:
      - frontend_cache:/app/.next/cache
    networks:
      - rps_network

  nginx:
    image: nginx:alpine
    restart: unless-stopped
    ports:
      - "127.0.0.1:8787:8786"
    volumes:
      - ./nginx.rps.conf:/etc/nginx/conf.d/default.conf:ro
      - nginx_cache:/var/cache/nginx
      - nginx_logs:/var/log/nginx
    depends_on:
      - backend
      - frontend
    networks:
      - rps_network

  n8n:
    image: n8nio/n8n:latest
    restart: unless-stopped
    environment:
      N8N_USER_FOLDER: ${N8N_USER_FOLDER:-/home/node/.n8n}
      N8N_HOST: ${N8N_HOST:-n8n}
      N8N_PORT: ${N8N_PORT:-5678}
      N8N_PROTOCOL: ${N8N_PROTOCOL:-http}
      N8N_SECURE_COOKIE: ${N8N_SECURE_COOKIE:-false}
      N8N_BASIC_AUTH_ACTIVE: ${N8N_BASIC_AUTH_ACTIVE:-true}
      N8N_BASIC_AUTH_USER: ${N8N_BASIC_AUTH_USER:-admin}
      N8N_BASIC_AUTH_PASSWORD: ${N8N_BASIC_AUTH_PASSWORD}
      N8N_ENCRYPTION_KEY: ${N8N_ENCRYPTION_KEY}
      N8N_PATH: ${N8N_PATH:-/n8n/}
      N8N_EDITOR_BASE_URL: ${N8N_EDITOR_BASE_URL:-http://localhost/n8n/}
      WEBHOOK_URL: ${WEBHOOK_URL:-http://localhost/n8n/}
      N8N_LISTEN_ADDRESS: ${N8N_LISTEN_ADDRESS:-0.0.0.0}
      TZ: ${TZ:-Indian/Antananarivo}
      GENERIC_TIMEZONE: ${GENERIC_TIMEZONE:-Indian/Antananarivo}
      DB_TYPE: ${DB_TYPE:-postgresdb}
      DB_POSTGRESDB_HOST: ${DB_HOST:-localhost}
      DB_POSTGRESDB_PORT: ${DB_PORT:-5432}
      DB_POSTGRESDB_DATABASE: ${DB_NAME_N8N:-rps_db}
      DB_POSTGRESDB_USER: ${DB_USER:-rps_user}
      DB_POSTGRESDB_PASSWORD: ${DB_PASSWORD:-rps_pass}
    volumes:
      - n8n_data:${N8N_USER_FOLDER:-/home/node/.n8n}
    extra_hosts:
      - "host.docker.internal:host-gateway"
    networks:
      - rps_network

networks:
  rps_network:
    driver: bridge

volumes:
  nginx_cache:
    driver: local
  nginx_logs:
    driver: local
  frontend_cache:
    driver: local
  n8n_data:
    driver: local
