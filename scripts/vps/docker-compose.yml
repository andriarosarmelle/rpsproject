version: '3.8'

services:
  postgres:
    image: postgres:16-alpine
    restart: unless-stopped
    container_name: rps-postgres
    environment:
      POSTGRES_USER: ${DB_USER:-rps_user}
      POSTGRES_PASSWORD: ${DB_PASSWORD:-rps_pass}
      POSTGRES_DB: ${DB_NAME:-rps_db}
    volumes:
      - postgres_data:/var/lib/postgresql/data
    ports:
      - "${DB_PORT:-5432}:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${DB_USER:-rps_user}"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - rps_network

  backend:
    build:
      context: ../../rps-backend
      dockerfile: Dockerfile
    restart: unless-stopped
    container_name: rps-backend
    environment:
      NODE_ENV: production
      PORT: 3000
      JWT_SECRET: ${JWT_SECRET}
      DB_HOST: postgres
      DB_PORT: 5432
      DB_USER: ${DB_USER:-rps_user}
      DB_PASSWORD: ${DB_PASSWORD:-rps_pass}
      DB_NAME: ${DB_NAME:-rps_db}
      DB_SYNCHRONIZE: "false"
      DB_LOGGING: "false"

      # n8n internal access
      N8N_BASE_URL: http://n8n:5678
      N8N_API_KEY: ${N8N_API_KEY:-}
      N8N_WEBHOOK_BASE: http://n8n:5678
    ports:
      - "3000:3000"
    depends_on:
      postgres:
        condition: service_healthy
      n8n:
        condition: service_started
    networks:
      - rps_network

  frontend:
    build:
      context: ../../rps-frontend/nextjs-app
      dockerfile: Dockerfile
    restart: unless-stopped
    container_name: rps-frontend
    environment:
      NODE_ENV: production
      PORT: 3001
      NEXT_PUBLIC_API_URL: ${NEXT_PUBLIC_API_URL:-http://localhost/api}
      API_URL: http://backend:3000/api
      NEXT_PUBLIC_STRAPI_URL: ${NEXT_PUBLIC_STRAPI_URL:-}
      STRAPI_API_TOKEN: ${STRAPI_API_TOKEN:-}
    ports:
      - "3001:3001"
    depends_on:
      - backend
    volumes:
      - frontend_cache:/app/.next/cache
    networks:
      - rps_network

  nginx:
    image: nginx:alpine
    restart: unless-stopped
    container_name: rps-nginx
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./nginx.rps.conf:/etc/nginx/conf.d/default.conf:ro
      - nginx_cache:/var/cache/nginx
      - nginx_logs:/var/log/nginx
    depends_on:
      - backend
      - frontend
    networks:
      - rps_network

  n8n:
    image: n8nio/n8n:latest
    restart: unless-stopped
    container_name: rps-n8n
    environment:
      N8N_BASIC_AUTH_ACTIVE: ${N8N_BASIC_AUTH_ACTIVE:-true}
      N8N_BASIC_AUTH_USER: ${N8N_BASIC_AUTH_USER:-admin}
      N8N_BASIC_AUTH_PASSWORD: ${N8N_BASIC_AUTH_PASSWORD:-changeme}
      N8N_ENCRYPTION_KEY: ${N8N_ENCRYPTION_KEY}
      N8N_HOST: n8n
      N8N_PORT: 5678
      N8N_PROTOCOL: http
      N8N_SECURE_COOKIE: false
      WEBHOOK_URL: ${WEBHOOK_URL:-http://n8n:5678/}
      N8N_EDITOR_BASE_URL: ${N8N_EDITOR_BASE_URL:-http://127.0.0.1:5678/}
    ports:
      - "127.0.0.1:5678:5678"
    volumes:
      - n8n_data:/home/node/.n8n
    networks:
      - rps_network

networks:
  rps_network:
    driver: bridge

volumes:
  postgres_data:
    driver: local
  nginx_cache:
    driver: local
  nginx_logs:
    driver: local
  frontend_cache:
    driver: local
  n8n_data:
    driver: local
